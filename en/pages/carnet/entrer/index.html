<body class="page-enter carnet">

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="../../../index.html" class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="13" /><circle cx="16" cy="16" r="7" /><circle cx="16" cy="16" r="1.5" fill="currentColor" />

        <span>The Inner Path</span>

      <button class="nav-toggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M3 12h18M3 18h18" /></svg>

          <li><a href="../">The journal</a></li>

  </header>

  <main>
    <section class="carnet-form">
      <div class="carnet-form__ar" lang="ar" dir="rtl">مِفْتَاح</div>
      <h1>Enter your journal</h1>
      <p class="carnet-form__sub"><em>your first name, and your seed-word</em></p>

      <form id="entrer-form" novalidate>
        <div class="carnet-field">
          <label for="prenom">Your first name</label>
          <input type="text" id="prenom" name="prenom" required autocomplete="given-name" />
        </div>

        <div class="carnet-field">
          <label for="motGraine">Your seed-word</label>
          <input type="text" id="motGraine" name="motGraine" required placeholder="e.g. sabr, hilm, sakina…" autocapitalize="none" autocorrect="off" spellcheck="false" />
          <span class="carnet-field__hint">As it was confided to you. No accents, no capitals.</span>
        </div>

        <button type="submit" class="carnet-btn carnet-btn--gold" id="submit-btn">
          Enter →
        </button>
        <p class="carnet-form__error" id="form-error" hidden></p>
      </form>

      <p class="carnet-form__note">
        No key yet? <a href="../demande/">Ask for yours →</a><br>
        Seed-word forgotten? <a href="../oubli/">Find it again →</a>
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="ornament">✦</div>
      <p class="small" style="margin-top:1rem;"><a href="../">← The journal</a> · <a href="../../../index.html">Home</a></p>
