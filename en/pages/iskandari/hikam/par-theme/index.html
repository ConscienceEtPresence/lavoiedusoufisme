<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />

  <meta name="description" content="The aphorisms of the Kitāb al-Ḥikam gathered by theme. Read those that speak to the movement that dwells in you today." />

  <link rel="alternate" hreflang="fr" href="https://lavoiedudedans.fr/pages/iskandari/hikam/par-theme/" />
  <link rel="alternate" hreflang="en" href="https://lavoiedudedans.fr/en/pages/iskandari/hikam/par-theme/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/iskandari.css?v=6" />
</head>
<body class="page-enter">
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/en/index.html" class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="13" /><circle cx="16" cy="16" r="7" /><circle cx="16" cy="16" r="1.5" fill="currentColor" />
        </svg>
        <span>The Inner Path</span>
      </a>
      <button class="nav-toggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
      </button>
      <nav>
        <ul class="site-nav">
          <li><a href="/en/index.html">Home</a></li>
          <li><a href="/en/pages/iskandari/">The way of wisdom</a></li>
          <li><a href="/en/pages/iskandari/hikam/">The Aphorisms</a></li>
          <li><a href="/en/pages/carnet/">Notebook</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="isk-subnav-slot"></div>
    <div id="theme-mount" class="isk-livre">
      <p style="text-align:center; color: var(--ink-soft); font-style: italic; padding: 3rem 1rem;">Loading…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="ornament">✦</div>
      <p class="small"><a href="/en/pages/iskandari/hikam/">← Choose another path</a> · <a href="/en/pages/iskandari/">The way of wisdom</a></p>
    </div>
  </footer>

  <script src="/assets/js/main.js?v=17"></script>
  <script src="/assets/js/partage.js?v=1"></script>
  <script type="module">
    import { loadHikam, loadCorpus, indexByTheme, injectSubnav, esc, FAMILLES_FR, FAMILLES_ORDER } from '/assets/js/iskandari/corpus.js?v=3';

    (async () => {
    injectSubnav('hikam');

    const mount = document.getElementById('theme-mount');
    const params = new URLSearchParams(location.search);
    const themeId = params.get('id');

    try {
      const [hikam, corpus] = await Promise.all([loadHikam(), loadCorpus()]);
      const byTheme = await indexByTheme(hikam, corpus);
      const modById = {};
      for (const m of corpus.thematic_modules || []) modById[m.id] = m;
      const sagesseToMods = {};
      for (const e of corpus.hikam_entry_index || []) sagesseToMods[e.id] = e.recommended_modules || [];

      if (!themeId) {
        // SOMMAIRE des thèmes
        document.title = 'Read by theme — Kitāb al-Ḥikam';
        // Tri : modules avec sagesses d'abord, dans l'ordre des familles
        const modsAvecSagesses = (corpus.thematic_modules || []).filter(m => (byTheme[m.id] || []).length > 0);
        // Group par famille
        const byFam = {};
        for (const m of modsAvecSagesses) {
          const f = m.famille || 'autres';
          (byFam[f] = byFam[f] || []).push(m);
        }
        const orderedKeys = [...FAMILLES_ORDER.filter(k => byFam[k]),
                             ...Object.keys(byFam).filter(k => !FAMILLES_ORDER.includes(k))];
        const html = orderedKeys.map(famKey => {
          const mods = byFam[famKey];
          return `
            <section class="isk-famille">
              <header class="isk-famille__head">
                <h2 class="isk-famille__name">${esc(FAMILLES_FR[famKey] || famKey)}</h2>
                <span class="isk-famille__count">${mods.length}</span>
              </header>
              <div class="isk-themes-grid" style="margin:.5rem 0;">
                ${mods.map(m => {
                  const count = (byTheme[m.id] || []).length;
                  return `
                    <a class="isk-theme-card" href="?id=${esc(m.id)}">
                      <h3 class="isk-theme-card__title">${esc(m.title_fr)}</h3>
                      <span class="isk-theme-card__count">${count} aphorism${count > 1 ? 's' : ''}</span>
                    </a>`;
                }).join('')}
              </div>
            </section>`;
        }).join('');

        mount.innerHTML = `
          <header class="isk-chapitre__head">
            <span class="isk-chapitre__rubrique">Read by theme</span>
            <h1 class="isk-chapitre__titre">Enter by what dwells in you</h1>
            <p class="isk-chapitre__count">${modsAvecSagesses.length} themes · gathered by great path</p>
            <div class="isk-chapitre__rule"></div>
          </header>
          <div class="isk-familles" style="max-width:none; padding:0;">${html}</div>
        `;
      } else {
        // LECTURE d'un thème
        const mod = modById[themeId];
        if (!mod) {
          mount.innerHTML = '<p style="text-align:center; color:#c44; padding:3rem;">Theme not found.</p>';
          return;
        }
        const items = (byTheme[themeId] || []).sort((a, b) => a.id - b.id);
        document.title = `${mod.title_fr} — Kitāb al-Ḥikam`;

        // Liste ordonnée des thèmes pour la pagination
        const modsAvecSagesses = (corpus.thematic_modules || []).filter(m => (byTheme[m.id] || []).length > 0);
        const idx = modsAvecSagesses.findIndex(m => m.id === themeId);
        const prevMod = idx > 0 ? modsAvecSagesses[idx - 1] : null;
        const nextMod = idx < modsAvecSagesses.length - 1 ? modsAvecSagesses[idx + 1] : null;

        const renderSagesse = (r) => {
          const cd = r.commentary_draft || {};
          const themes = (sagesseToMods[r.id] || [])
            .filter(id => id !== themeId)
            .map(id => modById[id])
            .filter(Boolean)
            .slice(0, 3)
            .map(m => `<a href="?id=${esc(m.id)}">${esc(m.title_fr)}</a>`)
            .join(' · ');
          return `
            <article class="isk-sagesse" id="s-${r.id}">
              <p class="isk-sagesse__num">
                <a href="/en/pages/iskandari/hikma/?id=${r.id}">Aphorism no. ${r.id}</a>
              </p>
              ${(r.french_translation || r.english_text_draft) ? `<p class="isk-sagesse__texte">${esc(r.french_translation || r.english_text_draft)}</p>` : ''}
              ${cd.explanation_fr ? `
                <div class="isk-sagesse__bloc">
                  <span class="isk-sagesse__label">The teaching</span>
                  <p class="isk-sagesse__corps">${esc(cd.explanation_fr)}</p>
                </div>` : ''}
              ${cd.classical_sources_note ? `
                <div class="isk-sagesse__bloc isk-sagesse__bloc--sources">
                  <span class="isk-sagesse__label">Classical sources</span>
                  <p class="isk-sagesse__corps">${esc(cd.classical_sources_note)}</p>
                </div>` : ''}
              ${cd.modern_insight_fr ? `
                <div class="isk-sagesse__bloc">
                  <span class="isk-sagesse__label">A reading for today</span>
                  <p class="isk-sagesse__corps">${esc(cd.modern_insight_fr)}</p>
                </div>` : ''}
              ${themes ? `<p class="isk-sagesse__themes"><em style="font-style:normal; letter-spacing:.04em; color:var(--isk-gold-deep); font-weight:600;">Other themes:</em> ${themes}</p>` : ''}
              <div class="isk-partager-inline">
                <button type="button" class="isk-partager-btn isk-partager-btn--small" data-partager="${r.id}">
                  <span class="isk-partager-btn__ico">✦</span>
                  Offer
                </button>
              </div>
            </article>`;
        };

        const navHTML = `
          <nav class="isk-livre__nav" aria-label="Theme navigation">
            ${prevMod ? `<a href="?id=${esc(prevMod.id)}">← ${esc(prevMod.title_fr)}</a>` : '<span></span>'}
            <span class="isk-livre__nav-center">Theme ${idx + 1} / ${modsAvecSagesses.length}</span>
            ${nextMod ? `<a href="?id=${esc(nextMod.id)}">${esc(nextMod.title_fr)} →</a>` : '<span></span>'}
          </nav>`;

        mount.innerHTML = `
          ${navHTML}
          <header class="isk-chapitre__head">
            <span class="isk-chapitre__rubrique">Read by theme</span>
            <p class="isk-bandeau__ar" lang="ar" dir="rtl" style="font-family:'Amiri',serif; font-size:1.4rem; color:var(--isk-gold-deep); margin:.2rem 0; direction:rtl;">${esc(mod.title_ar || '')}</p>
            <h1 class="isk-chapitre__titre">${esc(mod.title_fr)}</h1>
            <p class="isk-chapitre__count">${items.length} aphorism${items.length > 1 ? 's' : ''} on this theme</p>
            <div class="isk-chapitre__rule"></div>
          </header>
          <p style="text-align:center;"><a href="/en/pages/iskandari/hikam/par-theme/" style="color:var(--isk-gold-deep); text-decoration:none; border-bottom:1px dotted var(--isk-gold-deep); font-size:.92rem;">← All themes</a></p>
          ${items.map(renderSagesse).join('')}
          ${navHTML}
        `;

        // Bind boutons Offrir
        mount.querySelectorAll('[data-partager]').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = parseInt(btn.dataset.partager, 10);
            const r = items.find(x => x.id === id);
            if (!r) return;
            const text = r.french_translation || r.english_text_draft || '';
            const eyebrow = `✦  An aphorism to meditate upon  ✦`;
            const attribution = `Ḥikam no. ${r.id}  ·  Ibn ʿAṭāʾ Allāh al-Iskandarī  ·  lavoiedudedans.fr`;
            if (window.LVDDPartage && text) {
              window.LVDDPartage.open({ text, attribution, eyebrow });
            }
          });
        });
      }
    } catch (e) {
      mount.innerHTML = '<p style="text-align:center; color:#c44; padding:3rem;">Sorry, the aphorisms could not be loaded.</p>';
      console.error(e);
    }
    })();

  </script>
  <script type="module" src="/assets/js/pulse.js?v=3"></script>
</body>
</html>
