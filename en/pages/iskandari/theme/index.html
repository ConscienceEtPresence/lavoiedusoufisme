</head>
<body class="page-enter">

  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/en/index.html" class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="13" /><circle cx="16" cy="16" r="7" /><circle cx="16" cy="16" r="1.5" fill="currentColor" />
        </svg>
        <span>The Inner Path</span>
      </a>
      <button class="nav-toggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 6h18M3 12h18M3 18h18" />
        </svg>
      </button>
      <nav>
        <ul class="site-nav">
          <li><a href="/en/index.html">Home</a></li>
          <li><a href="/en/pages/iskandari/">The way of wisdom</a></li>
          <li><a href="/en/pages/iskandari/themes/" class="active">Themes</a></li>
          <li><a href="/en/pages/iskandari/hikam/">Ḥikam</a></li>
          <li><a href="/en/pages/carnet/">Notebook</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="isk-subnav-slot"></div>
    <div id="theme-mount" class="isk-module">
      <p style="text-align:center; color: var(--ink-soft); font-style: italic;">Loading…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="ornament">✦</div>
      <p class="small"><a href="/en/pages/iskandari/themes/">← All themes</a> · <a href="/en/index.html">Home</a></p>
    </div>
  </footer>

  <script src="/assets/js/main.js?v=17"></script>
  <script type="module">
    import { loadCorpus, esc, FAMILLES_FR, indexModules, indexHikam } from '/assets/js/iskandari/corpus.js?v=3';

    const mount = document.getElementById('theme-mount');
    const id = new URLSearchParams(location.search).get('id') || '';

    try {
      const corpus = await loadCorpus();
      const mods = indexModules(corpus);
      const mod = mods[id];
      if (!mod) {
        mount.innerHTML = `
          <p style="text-align:center;">Theme not found.</p>
          <p style="text-align:center;"><a href="/en/pages/iskandari/themes/" class="isk-module__back">← All themes</a></p>`;
        document.title = 'Theme not found — Iskandarī';
      } else {
        document.title = `${mod.title_fr} — Iskandarī`;
        const dailyMatin   = (mod.daily_practice?.matin   || []).map(p => `<li>${esc(p)}</li>`).join('');
        const dailyJournee = (mod.daily_practice?.journee || []).map(p => `<li>${esc(p)}</li>`).join('');
        const dailySoir    = (mod.daily_practice?.soir    || []).map(p => `<li>${esc(p)}</li>`).join('');
        const quickChoices = (mod.quick_choices || []).map(c => `<span class="isk-chip">${esc(c)}</span>`).join('');
        const pitfalls = (mod.pitfalls || []).map(p => `<div class="isk-pitfall">${esc(p)}</div>`).join('');

        // Linked hikam
        const hidx = indexHikam(corpus);
        const linked = (mod.linked_hikam_ids_detected || []).slice(0, 24);
        const linkedHTML = linked.length ? `
          <div class="isk-section">
            <span class="isk-section__label">Related wisdoms from the Ḥikam</span>
            <div class="isk-hikam-grid" style="margin-top:.6rem;">
              ${linked.map(n => `<a class="isk-hikma-tile" href="/en/pages/iskandari/hikma/?id=${n}"><span class="isk-hikma-tile__num">${n}</span></a>`).join('')}
            </div>
          </div>` : '';

        mount.innerHTML = `
          <a href="/en/pages/iskandari/themes/" class="isk-module__back">← All themes</a>
          <header class="isk-module__head">
            <p class="isk-module__ar" lang="ar" dir="rtl">${esc(mod.title_ar || '')}</p>
            <p class="isk-module__tr">${esc(mod.transliteration || '')}</p>
            <h1 class="isk-module__title">${esc(mod.title_fr || '')}</h1>
            <p class="isk-module__famille">${esc(FAMILLES_FR[mod.famille] || mod.famille || '')}</p>
          </header>

          <section class="isk-section">
            <span class="isk-section__label">Teaching</span>
            <p class="isk-section__body">${esc(mod.teaching || '')}</p>
          </section>

          ${mod.psychological_reading ? `
          <section class="isk-section isk-section--soft">
            <span class="isk-section__label">Psycho-spiritual reading</span>
            <p class="isk-section__body">${esc(mod.psychological_reading)}</p>
          </section>` : ''}

          ${mod.spiritual_direction ? `
          <section class="isk-section">
            <span class="isk-section__label">Inner direction</span>
            <p class="isk-section__body">${esc(mod.spiritual_direction)}</p>
          </section>` : ''}

          ${dailyMatin || dailyJournee || dailySoir ? `
          <section class="isk-section">
            <span class="isk-section__label">Living this theme through the day</span>
            ${dailyMatin ? `<p style="margin:.6rem 0 .2rem; font-weight:600; color:var(--isk-gold-deep,#8a7028);">In the morning</p><ul class="isk-list">${dailyMatin}</ul>` : ''}
            ${dailyJournee ? `<p style="margin:.6rem 0 .2rem; font-weight:600; color:var(--isk-gold-deep,#8a7028);">During the day</p><ul class="isk-list">${dailyJournee}</ul>` : ''}
            ${dailySoir ? `<p style="margin:.6rem 0 .2rem; font-weight:600; color:var(--isk-gold-deep,#8a7028);">In the evening</p><ul class="isk-list">${dailySoir}</ul>` : ''}
          </section>` : ''}

          ${quickChoices ? `
          <section class="isk-section">
            <span class="isk-section__label">Tools to bring back to the notebook</span>
            <div class="isk-quick-choices">${quickChoices}</div>
          </section>` : ''}

          ${pitfalls ? `
          <section class="isk-section">
            <span class="isk-section__label">Pitfalls to avoid</span>
            ${pitfalls}
          </section>` : ''}

          ${mod.journal_prompt ? `
          <div class="isk-journal">
            <span class="isk-journal__label">A question to carry</span>
            <p class="isk-journal__text">${esc(mod.journal_prompt)}</p>
          </div>` : ''}

          ${linkedHTML}
        `;
      }
    } catch (e) {
      mount.innerHTML = '<p style="text-align:center; color:#c44;">Sorry, the corpus could not be loaded.</p>';
      console.error(e);
    }
  </script>
  <script type="module" src="/assets/js/pulse.js?v=3"></script>

  <script type="module">
    import { injectSubnav } from '/assets/js/iskandari/corpus.js?v=3';
    injectSubnav('mediter');
  </script>
</body>
</html>
