      <div id="familles-mount" class="isk-familles">

  <script src="/assets/js/main.js?v=18"></script>
  <script type="module">
    import { loadCorpus, esc, FAMILLES_FR, FAMILLES_ORDER, modCardHTML } from '/assets/js/iskandari/corpus.js?v=4';
    const mount = document.getElementById('familles-mount');
    try {
      const corpus = await loadCorpus();
      // Group modules by famille
      const byFam = {};
      for (const m of corpus.thematic_modules) {
        const f = m.famille || 'module_complementaire';
        (byFam[f] = byFam[f] || []).push(m);
      }
      const orderedKeys = [...FAMILLES_ORDER.filter(k => byFam[k]),
                          ...Object.keys(byFam).filter(k => !FAMILLES_ORDER.includes(k))];
      mount.innerHTML = orderedKeys.map(famKey => {
        const mods = byFam[famKey];
        return `
          <section class="isk-famille">
            <header class="isk-famille__head">
              <h2 class="isk-famille__name">${esc(FAMILLES_FR[famKey] || famKey)}</h2>
              <span class="isk-famille__count">${mods.length} module${mods.length>1?'s':''}</span>
            </header>
            <div class="isk-modules-grid">
              ${mods.map(modCardHTML).join('')}
            </div>
          </section>`;
      }).join('');
    } catch (e) {
      mount.innerHTML = '<p style="text-align:center; color:#c44;">Sorry, the corpus could not be loaded.</p>';
      console.error(e);
    }
  </script>
  <script type="module" src="/assets/js/pulse.js?v=3"></script>

  <script type="module">
    import { injectSubnav } from '/assets/js/iskandari/corpus.js?v=4';

  </script>
