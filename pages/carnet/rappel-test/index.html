<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/img/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0F1830" />
  <title>Tester un rappel — Le carnet du dedans</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/carnet-adab.css?v=12" />
  <style>
    .rt { max-width: 30rem; margin: 0 auto; padding: 2.5rem 1.3rem 4rem; text-align: center; }
    .rt__cercle { width: 5rem; height: 5rem; margin: 0 auto 1.4rem; border-radius: 50%;
      background: radial-gradient(circle at 50% 45%, #e9d29a, #c0a050 55%, #8a7028);
      box-shadow: 0 0 50px -8px rgba(201,160,80,.6); animation: rt-pulse 4s ease-in-out infinite; }
    @keyframes rt-pulse { 0%,100%{transform:scale(.85);opacity:.8} 50%{transform:scale(1.1);opacity:1} }
    .rt__titre { font-family:'Cormorant Garamond',serif; font-size:2rem; font-weight:600; color:var(--adab-ink,#2a1f08); margin:0 0 .5rem; }
    .rt__sous { font-family:'Source Serif 4',serif; color:var(--adab-ink-mute,#8a7a55); font-size:1.05rem; line-height:1.6; margin:0 auto 2rem; max-width:24rem; }
    .rt__btn { display:block; width:100%; max-width:22rem; margin:.7rem auto; padding:1rem 1.4rem; border-radius:14px;
      border:none; cursor:pointer; font-family:'Cormorant Garamond',serif; font-size:1.25rem; font-weight:600;
      background:var(--adab-gold,#c0a050); color:#fff; box-shadow:0 12px 28px -18px rgba(138,112,40,.6); }
    .rt__btn--ghost { background:#fff; color:var(--adab-gold-deep,#8a7028); border:1px solid var(--adab-rule,rgba(192,160,80,.3)); }
    .rt__status { margin-top:1.6rem; font-family:'Source Serif 4',serif; font-size:1rem; line-height:1.5;
      color:var(--adab-ink-soft,#4a3a18); min-height:2.5rem; }
    .rt__status--ok { color:#3f6a26; }
    .rt__status--ko { color:#b4453a; }
    .rt__back { display:inline-block; margin-top:2rem; color:var(--adab-gold-deep,#8a7028);
      text-decoration:none; font-family:'Cormorant Garamond',serif; font-style:italic; border-bottom:1px dotted; }
  </style>
</head>
<body class="page-enter carnet-body">
  <main class="rt">
    <div class="rt__cercle" aria-hidden="true"></div>
    <h1 class="rt__titre">Tester un rappel</h1>
    <p class="rt__sous">On va voir ensemble à quoi ressemble une notification « Trois respirations » sur ton téléphone.</p>

    <button type="button" class="rt__btn" id="now">Activer et voir maintenant</button>
    <button type="button" class="rt__btn rt__btn--ghost" id="later" hidden>Tester dans 10 s (mets l'app en arrière-plan)</button>

    <div class="rt__status" id="status"></div>

    <hr style="border:none; border-top:1px solid var(--adab-rule,rgba(192,160,80,.3)); margin:2.5rem auto; max-width:20rem;" />

    <h2 class="rt__titre" style="font-size:1.5rem;">Le vrai rappel</h2>
    <p class="rt__sous">Celui qui arrive <strong>écran verrouillé, app fermée</strong>. Active-le, puis on t'enverra un vrai rappel.</p>
    <button type="button" class="rt__btn" id="push">Activer le rappel verrouillé</button>
    <div class="rt__status" id="pushStatus"></div>
    <textarea id="token" readonly hidden style="width:100%; max-width:22rem; height:6rem; margin:.6rem auto; display:block; font-size:.7rem; padding:.6rem; border-radius:10px; border:1px solid var(--adab-rule,rgba(192,160,80,.3)); color:#4a3a18;"></textarea>

    <a class="rt__back" href="/pages/carnet/aujourdhui/">← Revenir au carnet</a>
  </main>

  <script>
    const $ = id => document.getElementById(id);
    const set = (msg, cls) => { const s = $('status'); s.textContent = msg; s.className = 'rt__status' + (cls ? ' rt__status--' + cls : ''); };

    // S'assure que le service worker est enregistré (sinon serviceWorker.ready peut ne jamais répondre)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    function supported() {
      return ('Notification' in window) && ('serviceWorker' in navigator);
    }

    async function showSouffle() {
      const reg = await navigator.serviceWorker.ready;
      await reg.showNotification('Trois respirations', {
        body: 'Un instant de présence. Pose tout, et respire trois fois.',
        icon: '/assets/img/icon-192.png',
        badge: '/assets/img/favicon-32.png',
        tag: 'souffle',
        data: { url: '/pages/carnet/aujourdhui/' }
      });
    }

    async function activer() {
      if (!supported()) {
        set("Ton navigateur ne gère pas les notifications ici. Sur iPhone, ouvre bien le site depuis l'icône ajoutée à l'écran d'accueil (pas dans un onglet Safari).", 'ko');
        return false;
      }
      let perm = Notification.permission;
      if (perm === 'default') perm = await Notification.requestPermission();
      if (perm !== 'granted') {
        set("Notifications non autorisées. Tu peux les activer dans les réglages du téléphone pour cette app, puis réessayer.", 'ko');
        return false;
      }
      return true;
    }

    $('now').addEventListener('click', async () => {
      set('Un instant…');
      if (!(await activer())) return;
      try {
        await showSouffle();
        set("Envoyé ✦ Regarde en haut de ton écran (ou tire le centre de notifications). Tu peux aussi tester l'arrière-plan ci-dessous.", 'ok');
        $('later').hidden = false;
      } catch (e) {
        set("La notification n'a pas pu s'afficher : " + (e.message || e), 'ko');
      }
    });

    $('later').addEventListener('click', async () => {
      if (!(await activer())) return;
      set("Dans 10 secondes… Mets vite l'app en arrière-plan (reviens à l'écran d'accueil) pour la voir arriver.", 'ok');
      setTimeout(() => { showSouffle().catch(() => {}); }, 10000);
    });
  </script>

  <!-- Vrai push (Firebase Cloud Messaging) -->
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-messaging.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    const CFG = {
      apiKey: "AIzaSyBYlX1AcOP4Yg5rCy9T5tIcrV0WOTT3E24",
      authDomain: "la-voie-du-dedans.firebaseapp.com",
      projectId: "la-voie-du-dedans",
      storageBucket: "la-voie-du-dedans.firebasestorage.app",
      messagingSenderId: "531110328878",
      appId: "1:531110328878:web:322ac57d9504e750b83dbf"
    };
    const VAPID = "BAj9EMoAoBx2tuAAL5RJa11Iii2L5t3mr6YuDXt_HVCSsRDOlbbxrBRka21lcWTsO4651oePVUSQnpjpjqHESRM";

    const app = getApps().length ? getApps()[0] : initializeApp(CFG);
    const db = getFirestore(app);
    const psEl = document.getElementById('pushStatus');
    const tokEl = document.getElementById('token');
    const ps = (m, c) => { psEl.textContent = m; psEl.className = 'rt__status' + (c ? ' rt__status--' + c : ''); };

    document.getElementById('push').addEventListener('click', async () => {
      ps('Un instant…');
      try {
        if (!('serviceWorker' in navigator) || !('Notification' in window)) {
          ps("Notifications non gérées ici. Ouvre bien l'app depuis l'icône de l'écran d'accueil (iPhone).", 'ko'); return;
        }
        let perm = Notification.permission;
        if (perm === 'default') perm = await Notification.requestPermission();
        if (perm !== 'granted') { ps("Notifications non autorisées. Active-les dans les réglages, puis réessaie.", 'ko'); return; }

        const swReg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
        const messaging = getMessaging(app);
        const token = await getToken(messaging, { vapidKey: VAPID, serviceWorkerRegistration: swReg });
        if (!token) { ps("Impossible d'obtenir un jeton. Réessaie dans un instant.", 'ko'); return; }

        // On garde le jeton (pour t'envoyer le rappel ensuite, et pour le vrai rappel du soir)
        try {
          await setDoc(doc(db, 'push_tokens', token), {
            site: 'lavoiedudedans', ua: navigator.userAgent, createdAt: serverTimestamp()
          }, { merge: true });
        } catch (e) {}

        tokEl.value = token;
        tokEl.hidden = false;
        ps("Activé ✦ Ton appareil est prêt. J'ai bien reçu ton jeton — dis-le-moi et je t'envoie un vrai rappel sur ton écran verrouillé.", 'ok');
      } catch (e) {
        ps("Souci : " + (e.message || e), 'ko');
      }
    });
  </script>

  <script type="module" src="/assets/js/pulse.js?v=3"></script>
</body>
</html>
