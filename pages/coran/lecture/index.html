  <meta property="og:title" content="Lire le Coran — La voie du dedans" />
  <meta property="og:description" content="Une liseuse soufie : verset par verset, en glissant comme on tourne les pages d'un livre." />

<body class="lecture-body">

  <header class="lecture-head" id="lecture-head">
    <a href="../" class="lecture-head__back" aria-label="Retour au Coran">←</a>
    <div class="lecture-head__progress">
      <span class="lecture-head__sura" id="lec-sura">Sourate 1 · al-Fātiḥa</span>
      <span class="lecture-head__verse" id="lec-verse">verset 1 / 7</span>
    </div>
    <button type="button" class="lecture-head__aa" id="lec-aa-open" aria-label="Réglages d'affichage">Aa</button>
    <button type="button" class="lecture-head__toc" id="lec-toc-open" aria-label="Sommaire">☰</button>
  </header>

  <main class="lecture-stage" id="lecture-stage">
    <h1 class="visually-hidden">Lecture immersive du Coran</h1>
    <div class="lecture-pages" id="lecture-pages"></div>
    <div class="lecture-loading" id="lecture-loading"><div class="lecture-loading__dot"></div></div>
  </main>

  <footer class="lecture-foot">
    <button type="button" class="lecture-foot__btn" id="lec-prev" aria-label="Précédent">←</button>
    <span class="lecture-foot__hint" id="lec-hint">glissez pour tourner la page</span>
    <button type="button" class="lecture-foot__btn" id="lec-next" aria-label="Suivant">→</button>
  </footer>

  <!-- Sommaire -->
  <aside class="lecture-toc" id="lecture-toc" hidden aria-hidden="true">
    <div class="lecture-toc__panel">
      <header class="lecture-toc__head">
        <h2>Sommaire</h2>
        <button type="button" class="lecture-toc__close" id="lec-toc-close" aria-label="Fermer">✕</button>
      </header>
      <input type="search" class="lecture-toc__search" id="lec-toc-search" placeholder="Chercher une sourate…" />
      <div class="lecture-toc__list" id="lec-toc-list"></div>
    </div>
  </aside>

  <!-- Réglages Aa -->
  <aside class="lecture-aa" id="lecture-aa" hidden aria-hidden="true">
    <div class="lecture-aa__panel">
      <header class="lecture-aa__head">
        <h2>Affichage</h2>
        <button type="button" class="lecture-aa__close" id="lec-aa-close" aria-label="Fermer">✕</button>
      </header>

      <div class="lecture-aa__group">
        <div class="lecture-aa__label">Taille du texte</div>
        <div class="lecture-aa__row">
          <span class="lecture-aa__sample lecture-aa__sample--small">Aa</span>
          <input type="range" id="aa-size" min="0.8" max="1.5" step="0.05" value="1.0" />
          <span class="lecture-aa__sample lecture-aa__sample--big">Aa</span>
        </div>
      </div>

      <div class="lecture-aa__group">
        <div class="lecture-aa__label">Afficher en plus de l'arabe</div>
        <label class="lecture-aa__check"><input type="checkbox" id="aa-tr" /> <span>Translittération</span></label>
        <label class="lecture-aa__check"><input type="checkbox" id="aa-trad" /> <span>Traduction française</span></label>
        <label class="lecture-aa__check"><input type="checkbox" id="aa-com" /> <span>Commentaire</span></label>
      </div>

      <div class="lecture-aa__group">
        <label class="lecture-aa__check"><input type="checkbox" id="aa-mots" /> <span>Mots cliquables<br><em class="lecture-aa__hint">touchez un mot arabe pour sa racine et son sens</em></span></label>
      </div>

      <div class="lecture-aa__foot">
        <em>Vos réglages sont gardés sur cet appareil.</em>
      </div>
    </div>
  </aside>

  <!-- Popover : mot tappé -->
  <div class="lecture-pop" id="lec-pop" hidden role="dialog" aria-label="Définition du mot"></div>

  <!-- Reprise -->
  <div class="lecture-resume" id="lecture-resume" hidden></div>

  <script src="../../../assets/js/coran-lecture.js?v=3"></script>
<script type="module" src="/assets/js/pulse.js?v=2"></script>
</body>
</html>
