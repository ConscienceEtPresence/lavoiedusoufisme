<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0F1830" />
  <title>Lire un chapitre — Kitāb al-Ḥikam</title>
  <meta name="description" content="Lire un chapitre du Kitāb al-Ḥikam — texte, enseignement, sources classiques, lecture pour aujourd'hui." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/iskandari.css?v=6" />
</head>
<body class="page-enter">
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/index.html" class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="13" /><circle cx="16" cy="16" r="7" /><circle cx="16" cy="16" r="1.5" fill="currentColor" />
        </svg>
        <span>La voie du dedans</span>
      </a>
      <button class="nav-toggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
      </button>
      <nav>
        <ul class="site-nav">
          <li><a href="/index.html">Accueil</a></li>
          <li><a href="/pages/iskandari/">La voie des sagesses</a></li>
          <li><a href="/pages/iskandari/hikam/">Les Sagesses</a></li>
          <li><a href="/pages/carnet/">Carnet</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="isk-subnav-slot"></div>
    <div id="livre-mount" class="isk-livre">
      <p style="text-align:center; color: var(--ink-soft); font-style: italic; padding: 3rem 1rem;">Chargement…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="ornament">✦</div>
      <p class="small"><a href="/pages/iskandari/hikam/">← Choisir un autre chemin</a> · <a href="/pages/iskandari/">La voie des sagesses</a></p>
    </div>
  </footer>

  <script src="/assets/js/main.js?v=14"></script>
  <script src="/assets/js/partage.js?v=1"></script>
  <script type="module">
    import { loadHikam, loadCorpus, indexByChapter, CHAPTERS_ORDER, CHAPTER_TITRES_COURTS, injectSubnav, esc } from '/assets/js/iskandari/corpus.js?v=3';

    (async () => {
    injectSubnav('hikam');

    const mount = document.getElementById('livre-mount');
    const params = new URLSearchParams(location.search);
    const n = parseInt(params.get('n') || '1', 10);

    try {
      const [hikam, corpus] = await Promise.all([loadHikam(), loadCorpus()]);
      const byCh = indexByChapter(hikam);

      // Index du chapitre dans CHAPTERS_ORDER (n = 1..N)
      const idx = Math.max(0, Math.min(CHAPTERS_ORDER.length - 1, n - 1));
      const secId = CHAPTERS_ORDER[idx];
      const items = byCh[secId] || [];
      const title = items[0]?.section_title || CHAPTER_TITRES_COURTS[secId] || secId;

      // Modules pour les "Thèmes" en bas
      const modById = {};
      for (const m of corpus.thematic_modules || []) modById[m.id] = m;
      const sagesseToMods = {};
      for (const e of corpus.hikam_entry_index || []) sagesseToMods[e.id] = e.recommended_modules || [];

      document.title = `${title} — Kitāb al-Ḥikam`;

      const prevHref = idx > 0 ? `?n=${idx}` : '';
      const nextHref = idx < CHAPTERS_ORDER.length - 1 ? `?n=${idx + 2}` : '';
      const totalChapters = CHAPTERS_ORDER.length;

      const renderSagesseTexte = (r) => {
        // Le texte source : on a english_text_draft. On le présente en italique discret.
        const en = r.french_translation || r.english_text_draft || '';
        return `<p class="isk-sagesse__texte">${esc(en)}</p>`;
      };

      const renderSagesse = (r) => {
        const cd = r.commentary_draft || {};
        const themes = (sagesseToMods[r.id] || [])
          .map(id => modById[id])
          .filter(Boolean)
          .slice(0, 4)
          .map(m => `<a href="/pages/iskandari/hikam/par-theme/?id=${esc(m.id)}">${esc(m.title_fr)}</a>`)
          .join(' · ');
        return `
          <article class="isk-sagesse" id="s-${r.id}">
            <p class="isk-sagesse__num">
              <a href="/pages/iskandari/hikma/?id=${r.id}">Sagesse n° ${r.id}</a>
            </p>
            ${renderSagesseTexte(r)}
            ${cd.explanation_fr ? `
              <div class="isk-sagesse__bloc">
                <span class="isk-sagesse__label">L'enseignement</span>
                <p class="isk-sagesse__corps">${esc(cd.explanation_fr)}</p>
              </div>` : ''}
            ${cd.classical_sources_note ? `
              <div class="isk-sagesse__bloc isk-sagesse__bloc--sources">
                <span class="isk-sagesse__label">Sources classiques</span>
                <p class="isk-sagesse__corps">${esc(cd.classical_sources_note)}</p>
              </div>` : ''}
            ${cd.modern_insight_fr ? `
              <div class="isk-sagesse__bloc">
                <span class="isk-sagesse__label">Une lecture pour aujourd'hui</span>
                <p class="isk-sagesse__corps">${esc(cd.modern_insight_fr)}</p>
              </div>` : ''}
            ${themes ? `<p class="isk-sagesse__themes"><em style="font-style:normal; letter-spacing:.04em; color:var(--isk-gold-deep); font-weight:600;">Lire d'autres sagesses sur :</em> ${themes}</p>` : ''}
            <div class="isk-partager-inline">
              <button type="button" class="isk-partager-btn isk-partager-btn--small" data-partager="${r.id}">
                <span class="isk-partager-btn__ico">✦</span>
                Offrir
              </button>
            </div>
          </article>`;
      };

      const navHTML = `
        <nav class="isk-livre__nav" aria-label="Navigation chapitres">
          ${prevHref ? `<a href="${prevHref}">← Chapitre précédent</a>` : '<span></span>'}
          <span class="isk-livre__nav-center">Chapitre ${idx + 1} / ${totalChapters}</span>
          ${nextHref ? `<a href="${nextHref}">Chapitre suivant →</a>` : '<span></span>'}
        </nav>`;

      mount.innerHTML = `
        ${navHTML}
        <header class="isk-chapitre__head">
          <span class="isk-chapitre__rubrique">Lire par chapitre</span>
          <h1 class="isk-chapitre__titre">${esc(title)}</h1>
          <p class="isk-chapitre__count">${items.length} sagesse${items.length > 1 ? 's' : ''} · n° ${items[0]?.id || '?'} à n° ${items[items.length - 1]?.id || '?'}</p>
          <div class="isk-chapitre__rule"></div>
        </header>
        ${items.map(renderSagesse).join('')}
        ${navHTML}
      `;

      // Bind les boutons "Offrir" inline
      mount.querySelectorAll('[data-partager]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = parseInt(btn.dataset.partager, 10);
          const r = items.find(x => x.id === id);
          if (!r) return;
          const text = r.french_translation || r.english_text_draft || '';
          const eyebrow = `✦  Sagesse à méditer  ✦`;
          const attribution = `Ḥikam n° ${r.id}  ·  Ibn ʿAṭāʾ Allāh al-Iskandarī  ·  lavoiedudedans.fr`;
          if (window.LVDDPartage && text) {
            window.LVDDPartage.open({ text, attribution, eyebrow });
          }
        });
      });
    } catch (e) {
      mount.innerHTML = '<p style="text-align:center; color:#c44; padding: 3rem 1rem;">Désolé, les sagesses n\'ont pas pu être chargées.</p>';
      console.error(e);
    }
    })();
  
  </script>
  <script type="module" src="/assets/js/pulse.js?v=3"></script>
</body>
</html>
