<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/img/favicon-32.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#0F1830" />
  <title>Sagesse — Kitāb al-Ḥikam</title>
  <meta name="description" content="Une sagesse du Kitāb al-Ḥikam d'Ibn ʿAṭāʾ Allāh al-Iskandarī — texte, enseignement, sources classiques, lecture pour aujourd'hui." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;1,8..60,400&family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/base.css" />
  <link rel="stylesheet" href="/assets/css/layout.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/iskandari.css?v=6" />
</head>
<body class="page-enter">
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="/index.html" class="brand">
        <svg class="brand__mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.2">
          <circle cx="16" cy="16" r="13" /><circle cx="16" cy="16" r="7" /><circle cx="16" cy="16" r="1.5" fill="currentColor" />
        </svg>
        <span>La voie du dedans</span>
      </a>
      <button class="nav-toggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 6h18M3 12h18M3 18h18" /></svg>
      </button>
      <nav>
        <ul class="site-nav">
          <li><a href="/index.html">Accueil</a></li>
          <li><a href="/pages/iskandari/">La voie des sagesses</a></li>
          <li><a href="/pages/iskandari/hikam/">Les Sagesses</a></li>
          <li><a href="/pages/carnet/">Carnet</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div id="isk-subnav-slot"></div>
    <div id="hikma-mount" class="isk-livre">
      <p style="text-align:center; color: var(--ink-soft); font-style: italic; padding:3rem 1rem;">Chargement…</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="ornament">✦</div>
      <p class="small"><a href="/pages/iskandari/hikam/">← Les Sagesses</a> · <a href="/pages/iskandari/">La voie des sagesses</a></p>
    </div>
  </footer>

  <script src="/assets/js/main.js?v=14"></script>
  <script src="/assets/js/partage.js?v=1"></script>
  <script type="module">
    import { loadHikam, loadCorpus, injectSubnav, esc, CHAPTER_TITRES_COURTS } from '/assets/js/iskandari/corpus.js?v=3';

    (async () => {
    injectSubnav('hikam');

    const mount = document.getElementById('hikma-mount');
    const id = parseInt(new URLSearchParams(location.search).get('id') || '0', 10);

    try {
      const [hikam, corpus, nomsLookup] = await Promise.all([
        loadHikam(),
        loadCorpus(),
        fetch('/data/carnet/noms-lookup.json').then(r => r.json()).catch(() => ({}))
      ]);
      function nomGloss(label) {
        if (!label) return null;
        const key = String(label).split('(')[0].trim();
        return nomsLookup[key] || null;
      }
      const recs = hikam.records || [];
      const byId = {};
      for (const r of recs) byId[r.id] = r;

      const r = byId[id];
      if (!r) {
        mount.innerHTML = `
          <p style="text-align:center; padding:3rem;">Sagesse n° ${id} introuvable.</p>
          <p style="text-align:center;"><a href="/pages/iskandari/hikam/par-chapitre/?n=1">← Commencer par le chapitre 1</a></p>`;
        return;
      }

      document.title = `Sagesse n° ${r.id} — Kitāb al-Ḥikam`;

      const modById = {};
      for (const m of corpus.thematic_modules || []) modById[m.id] = m;
      const sagesseToMods = {};
      for (const e of corpus.hikam_entry_index || []) sagesseToMods[e.id] = e.recommended_modules || [];

      const themes = (sagesseToMods[r.id] || [])
        .map(mid => modById[mid])
        .filter(Boolean)
        .slice(0, 5)
        .map(m => `<a href="/pages/iskandari/hikam/par-theme/?id=${esc(m.id)}">${esc(m.title_fr)}</a>`)
        .join(' · ');

      const cd = r.commentary_draft || {};
      const chapTitle = r.section_title || CHAPTER_TITRES_COURTS[r.section_id] || r.section_id;

      const ids = recs.map(x => x.id).sort((a, b) => a - b);
      const pos = ids.indexOf(r.id);
      const prevId = pos > 0 ? ids[pos - 1] : null;
      const nextId = pos < ids.length - 1 ? ids[pos + 1] : null;

      const navHTML = `
        <nav class="isk-livre__nav">
          ${prevId ? `<a href="?id=${prevId}">← Sagesse n° ${prevId}</a>` : '<span></span>'}
          <span class="isk-livre__nav-center">${esc(chapTitle)}</span>
          ${nextId ? `<a href="?id=${nextId}">Sagesse n° ${nextId} →</a>` : '<span></span>'}
        </nav>`;

      mount.innerHTML = `
        ${navHTML}
        <header class="isk-chapitre__head">
          <span class="isk-chapitre__rubrique">Sagesse</span>
          <h1 class="isk-chapitre__titre">n° ${r.id}</h1>
          <p class="isk-chapitre__count">${esc(chapTitle)}</p>
          <div class="isk-chapitre__rule"></div>
        </header>

        <article class="isk-sagesse" style="border-top:0; padding-top:0; margin-top:0;">
          ${(r.french_translation || r.english_text_draft) ? `<p class="isk-sagesse__texte">${esc(r.french_translation || r.english_text_draft)}</p>` : ''}
          ${cd.explanation_fr ? `
            <div class="isk-sagesse__bloc">
              <span class="isk-sagesse__label">L'enseignement</span>
              <p class="isk-sagesse__corps">${esc(cd.explanation_fr)}</p>
            </div>` : ''}
          ${cd.classical_sources_note ? `
            <div class="isk-sagesse__bloc isk-sagesse__bloc--sources">
              <span class="isk-sagesse__label">Sources classiques</span>
              <p class="isk-sagesse__corps">${esc(cd.classical_sources_note)}</p>
            </div>` : ''}
          ${cd.modern_insight_fr ? `
            <div class="isk-sagesse__bloc">
              <span class="isk-sagesse__label">Une lecture pour aujourd'hui</span>
              <p class="isk-sagesse__corps">${esc(cd.modern_insight_fr)}</p>
            </div>` : ''}
          ${themes ? `<p class="isk-sagesse__themes"><em style="font-style:normal; letter-spacing:.04em; color:var(--isk-gold-deep); font-weight:600;">Lire d'autres sagesses sur :</em> ${themes}</p>` : ''}

          ${(() => {
            const firstMod = (sagesseToMods[r.id] || []).map(id => modById[id]).filter(Boolean)[0];
            const nd = firstMod?.nom_divin || '';
            if (!nd) return '';
            const g = nomGloss(nd);
            const ar = g?.ar || '';
            return `
              <div class="isk-nom-divin">
                <span class="isk-nom-divin__label">Le Nom qui accompagne cette sagesse</span>
                ${ar ? `<span class="isk-nom-divin__ar" lang="ar" dir="rtl">${esc(ar)}</span>` : ''}
                <strong class="isk-nom-divin__tr">${esc(nd)}</strong>
                ${g?.sens ? `<p class="isk-nom-divin__sens"><em>${esc(g.sens)}</em></p>` : ''}
                <p class="isk-nom-divin__incarn">Porter ce Nom, c'est laisser cette qualité passer à travers soi — dans le mot, le geste, le regard d'aujourd'hui. On ne « voit » pas Dieu : on incarne Ses Noms.</p>
              </div>
            `;
          })()}

          <div class="isk-partager-bloc">
            <button type="button" class="isk-partager-btn" id="btn-partager">
              <span class="isk-partager-btn__ico">✦</span>
              Offrir cette sagesse
            </button>
            <p class="isk-partager-hint"><em>Une carte pour la méditer, ou la partager à quelqu'un</em></p>
          </div>
        </article>

        ${navHTML}

        <p class="isk-livre__note">Traduction française originale, faite à partir de l'anglais de référence. Le texte arabe vocalisé sera ajouté plus tard, après vérification de source.</p>
      `;

      // Bouton partage — utilise LVDDPartage (canvas)
      const btnPart = document.getElementById('btn-partager');
      if (btnPart) {
        btnPart.addEventListener('click', () => {
          // Trouve le Nom divin du premier module recommandé
          const firstMod = (sagesseToMods[r.id] || []).map(id => modById[id]).filter(Boolean)[0];
          // Le nom divin peut être extrait du module si la corpus le contient
          const nomDivin = firstMod?.nom_divin || '';
          const eyebrow = nomDivin
            ? `✦  Le Nom qui accompagne · ${nomDivin}  ✦`
            : `✦  Sagesse à méditer  ✦`;
          const text = r.french_translation || r.english_text_draft || '';
          const attribution = `Ḥikam n° ${r.id}  ·  Ibn ʿAṭāʾ Allāh al-Iskandarī  ·  lavoiedudedans.fr`;
          if (window.LVDDPartage && text) {
            window.LVDDPartage.open({ text, attribution, eyebrow });
          } else {
            alert('Le module de partage n\'est pas chargé.');
          }
        });
      }
    } catch (err) {
      mount.innerHTML = '<p style="text-align:center; color:#c44; padding:3rem;">Désolé, la sagesse n\'a pas pu être chargée.</p>';
      console.error(err);
    }
    })();
  
  </script>
  <script type="module" src="/assets/js/pulse.js?v=3"></script>
</body>
</html>
